<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Focus mode</title>
    <link rel="stylesheet" href="blocked.css" />
    <style>
      .timer {
        font-variant-numeric: tabular-nums;
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 700;
        margin: 1.5rem 0 0;
        color: #e8eaed;
      }
      .lock {
        margin-top: 2rem;
        font-size: 0.875rem;
        color: #8a8f98;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="message">Focus mode</h1>
      <p id="focus" class="focus"></p>
      <p class="timer" id="timer">--:--</p>
      <p class="lock">Focus mode is locked until the timer ends.</p>
    </main>
    <script src="focus.js"></script>
  </body>
</html>
